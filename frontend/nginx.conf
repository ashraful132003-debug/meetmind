server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Uploads are audio files and can be large. nginx defaults to 1MB, which
    # would reject almost every real meeting with a confusing 413.
    client_max_body_size 210M;

    # Don't advertise the exact nginx version to anyone scanning.
    server_tokens off;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Serving the API from the same origin as the SPA is what lets the refresh
    # cookie be SameSite=Lax and keeps CORS out of the picture entirely.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Transcription can take minutes on CPU. The default 60s would cut the
        # upload response off mid-pipeline.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Audio streaming relies on range requests; buffering breaks seeking.
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Hashed asset filenames are content-addressed, so they can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html must never be cached, or users get a stale shell pointing at
    # asset hashes that no longer exist after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA routing: unknown paths are React Router's problem, not a 404.
    location / {
        try_files $uri $uri/ /index.html;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        # The SPA needs inline styles (the app sets them via the style prop) but
        # never inline scripts. connect-src is same-origin only: the frontend is
        # not permitted to talk to any third party, which enforces the privacy
        # claim in the browser itself rather than on trust.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; media-src 'self' blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
    }
}
